name: dual_cameras
description: >-
  Record the front and back cameras at the same time, composited live on the GPU
  into a single portrait video and photo, with a real-time preview. Android + iOS.
version: 0.1.0
homepage: https://dualcameras.com
repository: https://github.com/RomanSlack/dual_cameras/tree/main/packages/dual_cameras
issue_tracker: https://github.com/RomanSlack/dual_cameras/issues
topics:
  - camera
  - video
  - recording
  - dual-camera
  - multicam

screenshots:
  - description: "Front and back cameras composited into one portrait video, shown side by side."
    path: screenshots/banner.png
  - description: "Back camera full-frame with a circular selfie inset (picture-in-picture)."
    path: screenshots/demo-pip.jpg
  - description: "Swapped: the front camera leads with the rear scene as a circular inset."
    path: screenshots/demo-swap.jpg

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  dual_cameras_platform_interface: ^0.1.0
  dual_cameras_android: ^0.1.0
  dual_cameras_ios: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

flutter:
  plugin:
    platforms:
      android:
        default_package: dual_cameras_android
      ios:
        default_package: dual_cameras_ios
